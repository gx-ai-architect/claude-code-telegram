<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300">
  <defs>
    <linearGradient id="bbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="bpeak" x1="0%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#ff6b6b"/>
    </linearGradient>
    <linearGradient id="barrow" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0f3460"/>
      <stop offset="100%" style="stop-color:#533483"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" rx="16" fill="url(#bbg)"/>

  <!-- Mountain icon (left side) -->
  <g transform="translate(100, 30) scale(0.47)">
    <polygon points="256,100 370,320 142,320" fill="url(#bpeak)" opacity="0.95"/>
    <polygon points="310,160 400,320 220,320" fill="url(#barrow)" opacity="0.7"/>
    <circle cx="256" cy="115" r="12" fill="#fff" opacity="0.95"/>
    <polygon points="256,150 280,195 268,195 268,260 244,260 244,195 232,195" fill="#fff" opacity="0.85"/>
  </g>

  <!-- LOCKSTEP title -->
  <text x="380" y="145" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-weight="900" font-size="80" letter-spacing="6" fill="#ffffff">LOCKSTEP</text>

  <!-- Tagline -->
  <text x="385" y="195" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-weight="400" font-size="24" letter-spacing="4" fill="#e94560">YOUR AI PRIORITIZATION COACH</text>

  <!-- Subtitle -->
  <text x="385" y="235" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-weight="300" font-size="18" letter-spacing="2" fill="#8899aa">Fewer goals. Deeper focus. Real results.</text>
</svg>
