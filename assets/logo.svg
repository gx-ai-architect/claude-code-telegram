<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="peak" x1="0%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#ff6b6b"/>
    </linearGradient>
    <linearGradient id="arrow" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0f3460"/>
      <stop offset="100%" style="stop-color:#533483"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>

  <!-- Mountain peak -->
  <polygon points="256,100 370,320 142,320" fill="url(#peak)" opacity="0.95"/>

  <!-- Second peak (depth) -->
  <polygon points="310,160 400,320 220,320" fill="url(#arrow)" opacity="0.7"/>

  <!-- Summit marker / target dot -->
  <circle cx="256" cy="115" r="12" fill="#fff" opacity="0.95"/>

  <!-- Upward arrow from base -->
  <polygon points="256,150 280,195 268,195 268,260 244,260 244,195 232,195" fill="#fff" opacity="0.85"/>

  <!-- LOCKSTEP text -->
  <text x="256" y="390" text-anchor="middle" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-weight="900" font-size="56" letter-spacing="8" fill="#ffffff">LOCKSTEP</text>

  <!-- Tagline -->
  <text x="256" y="425" text-anchor="middle" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-weight="400" font-size="18" letter-spacing="3" fill="#e94560" opacity="0.9">FEWER GOALS. REAL RESULTS.</text>
</svg>
